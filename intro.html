<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AETHOFLIX</title>
<style>
  :root{
    --red:#e21b1b;
    --red-deep:#8f0000;
    --white:#f5f5f5;
    --silver:#cfcfcf;
    --bg:#050505;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
  }
  html,body{
    margin:0; padding:0;
    height:100%; width:100%;
    background:var(--bg);
    overflow:hidden;
    font-family: 'Arial Narrow', Arial, sans-serif;
  }
  .stage{
    position:relative;
    height:100vh; height:100dvh;
    width:100vw;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    perspective:1000px;
    padding: 6vh 6vw;
    box-sizing:border-box;
  }

  /* film grain / vignette */
  .grain{
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    pointer-events:none;
    z-index:5;
  }

  /* pulsing aura behind the logo */
  .aura{
    position:absolute;
    width:88vmin; height:88vmin;
    border-radius:50%;
    background: radial-gradient(circle, rgba(230,230,235,0.35) 0%, rgba(180,180,190,0.12) 35%, transparent 70%);
    filter: blur(20px);
    animation: auraPulse 3.2s ease-in-out infinite;
    opacity:0;
    animation-delay: 0.4s;
  }
  @keyframes auraPulse{
    0%{ transform:scale(0.85); opacity:0; }
    15%{ opacity:1; }
    50%{ transform:scale(1.08); opacity:0.85; }
    100%{ transform:scale(0.85); opacity:0.6; }
  }

  .logo-wrap{
    position:relative;
    z-index:4;
    display:flex; flex-direction:column; align-items:center;
    filter: drop-shadow(0 0 0 rgba(226,27,27,0));
    opacity:0;
    transform: scale(0.4) rotateX(25deg);
    animation: logoIn 1.4s cubic-bezier(.16,.9,.28,1) forwards;
  }
  @keyframes logoIn{
    0%{ opacity:0; transform:scale(0.4) rotateX(25deg); filter: blur(18px) drop-shadow(0 0 0 rgba(226,27,27,0)); }
    55%{ opacity:1; filter: blur(0px) drop-shadow(0 0 40px rgba(226,27,27,0.55)); }
    100%{ opacity:1; transform:scale(1) rotateX(0deg); filter: blur(0px) drop-shadow(0 0 55px rgba(226,27,27,0.75)); }
  }

  .logo-wrap img{
    width: min(92vw, 640px);
    max-height: 62dvh;
    height:auto;
    object-fit: contain;
    animation: breathe 3.2s ease-in-out infinite;
    animation-delay:1.4s;
  }
  @keyframes breathe{
    0%,100%{ filter: drop-shadow(0 0 35px rgba(226,27,27,0.55)) drop-shadow(0 0 12px rgba(255,255,255,0.25)); }
    50%{ filter: drop-shadow(0 0 65px rgba(226,27,27,0.9)) drop-shadow(0 0 20px rgba(255,255,255,0.45)); }
  }

  @keyframes fadeUp{
    0%{ opacity:0; transform:translateY(14px); }
    100%{ opacity:1; transform:translateY(0); }
  }

  .enter{
    position:absolute;
    bottom: max(6vh, env(safe-area-inset-bottom, 0px) + 24px);
    z-index:6;
    padding:0.9em 2.6em;
    border:1px solid rgba(226,27,27,0.6);
    color:var(--white);
    background:rgba(0,0,0,0.3);
    letter-spacing:0.3em;
    font-size:0.8rem;
    text-transform:uppercase;
    cursor:pointer;
    border-radius:2px;
    opacity:0;
    animation: fadeUp 1s ease-out forwards, glowBorder 2.4s ease-in-out infinite;
    animation-delay:2.6s, 2.6s;
    transition: background 0.3s, color 0.3s;
  }
  .enter:hover{
    background:var(--red);
    color:#fff;
  }
  @keyframes glowBorder{
    0%,100%{ box-shadow:0 0 8px rgba(226,27,27,0.3); }
    50%{ box-shadow:0 0 22px rgba(226,27,27,0.7); }
  }
</style>
</head>
