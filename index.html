<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AethoFlix | Cinematic Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="nav">
    <div class="brand" onclick="goHome()">AETHO<span>FLIX</span></div>
    <div class="nav-links">
      <a onclick="goHome()" class="active" id="nav-home">Home</a>
      <a onclick="loadSearch('tv')" id="nav-tv">Series</a>
      <a onclick="loadSearch('movie')" id="nav-movie">Films</a>
    </div>
    <div class="nav-tools">
      <div class="search-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Titles, people, genres" oninput="handleSearch()">
      </div>
      <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 4px;"></div>
    </div>
  </header>

  <div id="home-view">
    <div id="hero">
      <img id="hero-img" class="hero-bg" src="" alt="Hero">
      <div class="hero-vignette"></div>
      <div class="hero-content">
        <div class="hero-type" id="hero-type">SERIES</div>
        <div class="hero-title" id="hero-title">LOADING...</div>
        <div class="hero-desc" id="hero-desc"></div>
        <div class="hero-buttons">
          <button class="btn-play" id="hero-play">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play
          </button>
          <button class="btn-info" id="hero-info">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> More Info
          </button>
        </div>
      </div>
    </div>
    <div id="main-content"></div>
  </div>

  <div id="search-view">
    <div class="row-header" id="search-title" style="margin-bottom: 20px;">Browse</div>
    <div class="search-grid" id="search-grid"></div>
  </div>

  <div id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <button class="close-modal" onclick="closeModal()">✕</button>
      <div class="modal-hero">
        <img id="mod-img" src="" alt="">
        <div class="modal-fade"></div>
      </div>
      <div class="modal-info">
        <div class="modal-title" id="mod-title">Title</div>
        <div class="modal-meta">
          <span class="match" id="mod-match">98% Match</span>
          <span id="mod-year">2026</span>
          <span id="mod-rt" style="border:1px solid rgba(255,255,255,0.4); padding:2px 6px; font-size:10px;">HD</span>
        </div>
        <div class="modal-actions">
          <button class="btn-play" id="mod-play">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play
          </button>
        </div>
        <div class="modal-desc" id="mod-desc"></div>
      </div>
    </div>
  </div>

  <div id="player-container">
    <iframe id="vidframe" class="player-iframe" allowfullscreen></iframe>
    
    <div class="player-ui" id="player-ui">
      <div class="player-top">
        <button class="player-back" onclick="closePlayer()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          <span id="player-title">Loading...</span>
        </button>
        <div class="server-selector" id="server-list"></div>
      </div>
      
      <div class="player-bottom-right" id="ep-btn-wrap" style="display: none;">
        <button class="episodes-btn" onclick="toggleDrawer()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Episodes
        </button>
      </div>
    </div>

    <div id="episodes-drawer">
      <div class="drawer-header">
        <h2>Episodes</h2>
        <button onclick="toggleDrawer()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div style="padding: 0 30px;">
        <select class="season-select" id="drawer-season" onchange="loadDrawerEps(this.value)"></select>
      </div>
      <div class="drawer-body" id="drawer-eps"></div>
    </div>
  </div>

<script>
  const API_KEY = 'fca1c3fa675f74cf4aa8d24b72dd4807';
  const BASE_URL = 'https://api.tmdb.org/3';
  const IMG_URL = 'https://image.tmdb.org/t/p/original';
  const IMG_W500 = 'https://image.tmdb.org/t/p/w500';

  // Player State
  let curPlay = null;
  let playerTimeout;

  // Scroll Navbar effect
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
  });

  // Hide Player UI on inactivity (Exactly like Netflix)
  document.getElementById('player-container').addEventListener('mousemove', () => {
    const pc = document.getElementById('player-container');
    pc.classList.remove('hide-ui');
    clearTimeout(playerTimeout);
    playerTimeout = setTimeout(() => {
      if(pc.classList.contains('active') && !document.getElementById('episodes-drawer').classList.contains('active')) {
        pc.classList.add('hide-ui');
      }
    }, 3000);
  });

  async function fetchAPI(endpoint) {
    const res = await fetch(`${BASE_URL}${endpoint}${endpoint.includes('?') ? '&' : '?'}api_key=${API_KEY}`);
    return res.json();
  }

  async function init() {
    const trending = await fetchAPI('/trending/all/week');
    const heroItem = trending.results[0]; // Top trending takes the hero spot
    
    // Set Hero
    document.getElementById('hero-img').src = IMG_URL + heroItem.backdrop_path;
    document.getElementById('hero-type').innerText = heroItem.media_type === 'tv' ? 'SERIES' : 'FILM';
    document.getElementById('hero-title').innerText = heroItem.title || heroItem.name;
    document.getElementById('hero-desc').innerText = heroItem.overview;
    
    document.getElementById('hero-play').onclick = () => openPlayer(heroItem.id, heroItem.media_type, heroItem.title || heroItem.name);
    document.getElementById('hero-info').onclick = () => openModal(heroItem.id, heroItem.media_type);

    // Build Rows
    const rows = [
      { title: 'Trending Now', endpoint: '/trending/all/week', type: 'backdrop' },
      { title: 'Cinematic Thrillers', endpoint: '/discover/movie?with_genres=53', type: 'poster' },
      { title: 'Dark Crime Series', endpoint: '/discover/tv?with_genres=80', type: 'backdrop' },
      { title: 'Action Packed', endpoint: '/discover/movie?with_genres=28', type: 'poster' }
    ];

    let html = '';
    for (const r of rows) {
      const data = await fetchAPI(r.endpoint);
      const cards = data.results.map(item => `
        <div class="card ${r.type === 'poster' ? 'poster-card' : ''}" onclick="openModal(${item.id}, '${item.media_type || (r.endpoint.includes('tv') ? 'tv' : 'movie')}')">
          <img src="${(r.type === 'poster' ? IMG_W500 + item.poster_path : IMG_W500 + item.backdrop_path)}" loading="lazy">
          <div class="card-overlay">
            <div class="card-title">${item.title || item.name}</div>
            <div class="card-meta"><span>${(item.release_date || item.first_air_date || '').slice(0,4)}</span></div>
          </div>
        </div>
      `).join('');
      
      html += `
        <div class="row">
          <div class="row-header">${r.title}</div>
          <div class="row-slider">${cards}</div>
        </div>
      `;
    }
    document.getElementById('main-content').innerHTML = html;
  }

  // --- MODAL (INFO SHEET) ---
  async function openModal(id, type) {
    document.body.style.overflow = 'hidden';
    const data = await fetchAPI(`/${type}/${id}`);
    document.getElementById('mod-img').src = IMG_URL + data.backdrop_path;
    document.getElementById('mod-title').innerText = data.title || data.name;
    document.getElementById('mod-match').innerText = Math.round(data.vote_average * 10) + '% Match';
    document.getElementById('mod-year').innerText = (data.release_date || data.first_air_date || '').slice(0,4);
    document.getElementById('mod-desc').innerText = data.overview;
    document.getElementById('mod-play').onclick = () => { closeModal(); openPlayer(id, type, data.title || data.name); };
    document.getElementById('modal-overlay').classList.add('active');
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    document.body.style.overflow = 'auto';
  }

  // --- PLAYER OVERLAY ---
  function getVidUrl(id, type, s, e, srv) {
    const servers = type === 'tv' ? [
      `https://vidout.pages.dev/tv/${id}/${s}/${e}`,
      `https://player.videasy.net/tv/${id}/${s}/${e}`,
      `https://vidlink.pro/tv/${id}/${s}/${e}?autoplay=true`
    ] : [
      `https://vidout.pages.dev/movie/${id}`,
      `https://player.videasy.net/movie/${id}`,
      `https://vidlink.pro/movie/${id}?autoplay=true`
    ];
    return servers[srv] || servers[0];
  }

  async function openPlayer(id, type, title, season = 1, ep = 1) {
    document.body.style.overflow = 'hidden';
    curPlay = { id, type, title, s: season, e: ep, srv: 0 };
    
    document.getElementById('player-container').classList.add('active');
    document.getElementById('player-title').innerText = title;
    
    // Server setup
    const srvNames = ['Vidout', 'Videasy', 'VidLink'];
    document.getElementById('server-list').innerHTML = srvNames.map((n, i) => 
      `<button class="server-btn ${i===0?'active':''}" onclick="setSrv(${i}, this)">${n}</button>`
    ).join('');

    if (type === 'tv') {
      document.getElementById('ep-btn-wrap').style.display = 'block';
      const meta = await fetchAPI(`/tv/${id}`);
      const seasons = meta.seasons.filter(s => s.season_number > 0);
      document.getElementById('drawer-season').innerHTML = seasons.map(s => 
        `<option value="${s.season_number}">Season ${s.season_number}</option>`
      ).join('');
      loadDrawerEps(1);
    } else {
      document.getElementById('ep-btn-wrap').style.display = 'none';
      document.getElementById('episodes-drawer').classList.remove('active');
    }
    setSrv(0);
  }

  function setSrv(idx, btnNode) {
    curPlay.srv = idx;
    if(btnNode) {
      document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
      btnNode.classList.add('active');
    }
    document.getElementById('vidframe').src = getVidUrl(curPlay.id, curPlay.type, curPlay.s, curPlay.e, idx);
  }

  function closePlayer() {
    document.getElementById('player-container').classList.remove('active');
    document.getElementById('vidframe').src = '';
    document.body.style.overflow = 'auto';
    curPlay = null;
  }

  // --- SIDE DRAWER ---
  function toggleDrawer() {
    document.getElementById('episodes-drawer').classList.toggle('active');
  }

  async function loadDrawerEps(season) {
    document.getElementById('drawer-eps').innerHTML = '<p style="color:#aaa; text-align:center;">Loading episodes...</p>';
    const d = await fetchAPI(`/tv/${curPlay.id}/season/${season}`);
    document.getElementById('drawer-eps').innerHTML = d.episodes.map(ep => `
      <div class="ep-card ${ep.episode_number === curPlay.e && season == curPlay.s ? 'active' : ''}" onclick="playDrawerEp(${season}, ${ep.episode_number})">
        <div class="ep-num">${ep.episode_number}</div>
        <div class="ep-thumb"><img src="${IMG_W500 + ep.still_path}" loading="lazy"></div>
        <div class="ep-details">
          <h4>${ep.name}</h4>
          <p>${ep.overview}</p>
        </div>
      </div>
    `).join('');
  }

  function playDrawerEp(s, e) {
    curPlay.s = s; curPlay.e = e;
    toggleDrawer(); // Hide drawer on play
    setSrv(0, document.querySelector('.server-btn')); // default back to Vidout
    loadDrawerEps(s); // refresh active state
  }

  // --- VIEWS ---
  function goHome() {
    document.getElementById('home-view').style.display = 'block';
    document.getElementById('search-view').style.display = 'none';
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    document.getElementById('nav-home').classList.add('active');
    document.getElementById('search-input').value = '';
  }

  let searchTimeout;
  async function handleSearch() {
    const q = document.getElementById('search-input').value.trim();
    if(!q) return goHome();
    
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('search-view').style.display = 'block';
    document.getElementById('search-title').innerText = `Search results for "${q}"`;
    
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
      const d = await fetchAPI(`/search/multi?query=${encodeURIComponent(q)}`);
      const items = d.results.filter(i => (i.media_type==='movie'||i.media_type==='tv') && i.poster_path);
      document.getElementById('search-grid').innerHTML = items.map(item => `
        <div class="card poster-card" onclick="openModal(${item.id}, '${item.media_type}')">
          <img src="${IMG_W500 + item.poster_path}">
        </div>
      `).join('');
    }, 400);
  }

  init();
</script>
</body>
</html>
