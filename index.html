<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>AethoFlix</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #080810;
      --surface: #0f0f1a;
      --card: #14141f;
      --border: #1e1e2e;
      --accent: #e50914;
      --accent2: #ff2233;
      --gold: #f5a623;
      --text: #f0f0f5;
      --sub: #8888aa;
      --muted: #3a3a55;
      --blue: #60a5fa;
      --green: #22c55e;
      --font: 'Inter', sans-serif;
      --nav: 56px;
      --bnav: 60px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
      padding-bottom: var(--bnav);
    }

    ::-webkit-scrollbar {
      width: 3px;
      height: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--muted);
      border-radius: 2px;
    }

    img {
      display: block;
      user-select: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: var(--font);
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }

    /* ─── TOP NAV ─── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4%;
      z-index: 3000;
      background: linear-gradient(to bottom, rgba(8, 8, 16, 0.97), transparent);
      transition: background 0.3s;
    }

    .nav.solid {
      background: rgba(8, 8, 16, 0.98);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -1px;
      cursor: pointer;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo span {
      color: var(--text);
      font-weight: 300;
    }

    .nav-r {
      display: flex;
      gap: 8px;
    }

    .nav-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-icon:active {
      background: rgba(255, 255, 255, 0.14);
    }

    /* ─── BOTTOM NAV ─── */
    .bnav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--bnav);
      background: rgba(8, 8, 16, 0.98);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 3000;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .bn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: var(--muted);
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: 0.15s;
    }

    .bn.on {
      color: var(--accent);
    }

    .bn-ic {
      font-size: 1.15rem;
      line-height: 1;
    }

    /* ─── PAGES ─── */
    .pg {
      display: none;
      min-height: 100vh;
      animation: fadeUp 0.2s ease;
    }

    .pg.on {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      width: 100%;
      height: 82vw;
      min-height: 380px;
      max-height: 660px;
      overflow: hidden;
    }

    .hslides {
      position: absolute;
      inset: 0;
    }

    .hslide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .hslide.on {
      opacity: 1;
      z-index: 1;
    }

    .hslide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
    }

    .hero-grad {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(to right, rgba(8, 8, 16, 0.95) 0%, rgba(8, 8, 16, 0.5) 40%, transparent 100%),
        linear-gradient(to top, var(--bg) 0%, rgba(8, 8, 16, 0.7) 18%, transparent 55%),
        linear-gradient(to bottom, rgba(8, 8, 16, 0.55) 0%, transparent 18%);
    }

    .hero-body {
      position: absolute;
      bottom: 11%;
      left: 4%;
      right: 4%;
      z-index: 3;
      max-width: 520px;
    }

    .h-eye {
      font-size: 0.56rem;
      font-weight: 800;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .h-eye::before {
      content: '';
      display: inline-block;
      width: 16px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
    }

    .h-title {
      font-size: clamp(1.6rem, 5.5vw, 2.8rem);
      font-weight: 900;
      line-height: 1.03;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .h-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.74rem;
      font-weight: 600;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .h-rat {
      color: var(--gold);
    }

    .h-yr {
      color: var(--sub);
    }

    .h-tag {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 0.6rem;
      color: var(--sub);
    }

    .h-desc {
      font-size: 0.79rem;
      color: #aaaac8;
      line-height: 1.65;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .h-btns {
      display: flex;
      gap: 8px;
    }

    .hbtn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 0.84rem;
      font-weight: 800;
      transition: 0.15s;
      cursor: pointer;
    }

    .hbtn-play {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 18px rgba(229, 9, 20, 0.3);
    }

    .hbtn-play:active {
      transform: scale(0.97);
    }

    .hbtn-info {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.17);
    }

    .hbtn-info:active {
      background: rgba(255, 255, 255, 0.2);
    }

    .hdots {
      position: absolute;
      bottom: 4%;
      right: 4%;
      z-index: 4;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .hdot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: 0.3s;
    }

    .hdot.on {
      background: var(--accent);
      width: 16px;
      border-radius: 3px;
    }

    /* ─── GENRE STRIP ─── */
    .gstrip {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 12px 4% 6px;
    }

    .gstrip::-webkit-scrollbar {
      display: none;
    }

    .gpill {
      padding: 6px 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--sub);
      cursor: pointer;
      white-space: nowrap;
      transition: 0.2s;
      flex-shrink: 0;
    }

    .gpill.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .gpill:active {
      opacity: 0.7;
    }

    /* ─── ROWS ─── */
    .rows {
      padding: 4px 4% 10px;
    }

    .row {
      margin-bottom: 22px;
    }

    .row-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .row-ttl {
      font-size: 0.84rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .row-badge {
      font-size: 0.48rem;
      font-weight: 900;
      background: var(--accent);
      color: #fff;
      padding: 2px 5px;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }

    .row-more {
      font-size: 0.66rem;
      color: var(--sub);
      font-weight: 600;
      cursor: pointer;
    }

    .slider {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 3px 2px 8px;
      scroll-snap-type: x mandatory;
    }

    .slider::-webkit-scrollbar {
      display: none;
    }

    /* ─── CARDS ─── */
    .pcard {
      min-width: 96px;
      width: 96px;
      flex-shrink: 0;
      cursor: pointer;
      scroll-snap-align: start;
      position: relative;
    }

    .pcard:active {
      transform: scale(0.93);
    }

    .pcard-img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 7px;
      background: var(--card);
    }

    .pcard-name {
      font-size: 0.58rem;
      font-weight: 600;
      margin-top: 4px;
      color: var(--sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pcard-meta {
      font-size: 0.53rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .pcard-new {
      position: absolute;
      top: 5px;
      left: 5px;
      background: var(--accent);
      color: #fff;
      font-size: 0.46rem;
      font-weight: 900;
      padding: 2px 5px;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }

    .wcard {
      min-width: 190px;
      width: 190px;
      flex-shrink: 0;
      cursor: pointer;
      scroll-snap-align: start;
      border-radius: 7px;
      overflow: hidden;
      position: relative;
    }

    .wcard:active {
      transform: scale(0.96);
    }

    .wcard-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--card);
    }

    .wcard-over {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.88) 0%, transparent 55%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 8px;
    }

    .wcard-title {
      font-size: 0.7rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .wcard-sub {
      font-size: 0.55rem;
      color: var(--sub);
      margin-top: 2px;
    }

    .t10card {
      min-width: 124px;
      width: 124px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      cursor: pointer;
      position: relative;
      scroll-snap-align: start;
    }

    .t10card:active {
      transform: scale(0.95);
    }

    .t10-num {
      font-size: 4.5rem;
      font-weight: 900;
      color: var(--bg);
      -webkit-text-stroke: 2px var(--muted);
      line-height: 1;
      position: absolute;
      left: 0;
      bottom: -4px;
      z-index: 1;
      letter-spacing: -4px;
    }

    .t10-img {
      width: 76px;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 7px;
      margin-left: 38px;
      z-index: 2;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.7);
    }

    /* ─── SKELETON ─── */
    .sk {
      background: linear-gradient(90deg, var(--surface) 25%, var(--card) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: sk 1.4s infinite;
      border-radius: 7px;
    }

    @keyframes sk {
      0% {
        background-position: 200% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }

    .sk-p {
      min-width: 96px;
      width: 96px;
      aspect-ratio: 2/3;
      flex-shrink: 0;
    }

    .sk-w {
      min-width: 190px;
      width: 190px;
      aspect-ratio: 16/9;
      flex-shrink: 0;
    }

    .sk-t {
      min-width: 124px;
      width: 124px;
      height: 114px;
      flex-shrink: 0;
    }

    /* ─── DIVIDER ─── */
    .sdiv {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0 6px;
    }

    .sdiv-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .sdiv-lbl {
      font-size: 0.58rem;
      font-weight: 900;
      color: var(--muted);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ─── SEARCH PAGE ─── */
    .srch-pg {
      padding: calc(var(--nav) + 12px) 4% 20px;
    }

    .srch-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .srch-inp {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 11px 36px 11px 40px;
      border-radius: 10px;
      font-size: 0.86rem;
      font-family: var(--font);
      outline: none;
      transition: 0.2s;
    }

    .srch-inp:focus {
      border-color: var(--accent);
      background: rgba(229, 9, 20, 0.04);
    }

    .srch-inp::placeholder {
      color: var(--muted);
    }

    .srch-ic {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
      font-size: 0.88rem;
      pointer-events: none;
    }

    .srch-ttl {
      font-size: 0.88rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .srch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 8px;
    }

    .ftabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      margin-bottom: 10px;
    }

    .ftabs::-webkit-scrollbar {
      display: none;
    }

    .ftab {
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 0.66rem;
      font-weight: 700;
      color: var(--sub);
      cursor: pointer;
      white-space: nowrap;
      transition: 0.2s;
    }

    .ftab.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 20px;
      text-align: center;
      gap: 8px;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    .empty-ic {
      font-size: 2.2rem;
    }

    .empty-txt {
      font-size: 0.8rem;
    }

    /* ─── DETAIL SHEET ─── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 4, 12, 0.85);
      z-index: 9000;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      backdrop-filter: blur(6px);
    }

    .overlay.on {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      background: var(--surface);
      border-radius: 18px 18px 0 0;
      width: 100%;
      max-height: 91vh;
      overflow-y: auto;
      transform: translateY(50px);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      border-top: 1px solid var(--border);
      position: relative;
    }

    .overlay.on .sheet {
      transform: translateY(0);
    }

    .sheet-back {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--card);
      display: block;
    }

    .sheet-fade {
      height: 56px;
      margin-top: -56px;
      background: linear-gradient(to top, var(--surface), transparent);
    }

    .sheet-body {
      padding: 2px 18px 34px;
    }

    .sheet-pill {
      display: inline-block;
      font-size: 0.56rem;
      font-weight: 800;
      letter-spacing: 2.5px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .sheet-title {
      font-size: 1.3rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .sheet-meta {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 0.71rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .sm-rat {
      color: var(--gold);
    }

    .sm-yr {
      color: var(--sub);
    }

    .sm-tag {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 0.58rem;
      color: var(--sub);
    }

    .sheet-ov {
      font-size: 0.78rem;
      color: #aaaac8;
      line-height: 1.65;
      margin-bottom: 14px;
    }

    .sheet-buttons {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }

    .watch-btn {
      flex: 1;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-family: var(--font);
      cursor: pointer;
      transition: 0.15s;
    }

    .watch-btn:active {
      transform: scale(0.97);
      background: var(--accent2);
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s;
      flex-shrink: 0;
      font-family: var(--font);
    }

    .icon-btn:active {
      background: rgba(255, 255, 255, 0.16);
      transform: scale(0.95);
    }

    .icon-btn.on {
      background: rgba(229, 9, 20, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    .sheet-cast {
      font-size: 0.68rem;
      color: var(--sub);
      margin-top: 10px;
      line-height: 1.5;
    }

    .sheet-cast b {
      color: var(--text);
    }

    .sheet-close {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      border: none;
    }

    /* ─── PLAYER PAGE ─── */
    .player-pg {
      display: none;
      min-height: 100vh;
      background: var(--bg);
      padding-bottom: 80px;
    }

    .player-pg.on {
      display: block;
      animation: fadeUp 0.2s ease;
    }

    .vid-wrap {
      width: 100%;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 100;
      aspect-ratio: 16 / 9;
    }

    .vid-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .ctrl-bar {
      background: #0a0a14;
      border-bottom: 1px solid var(--border);
      padding: 8px 4%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ctrl-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .ctrl-back {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--sub);
      cursor: pointer;
      background: none;
      border: none;
      flex-shrink: 0;
    }

    .ctrl-back:active {
      color: var(--text);
    }

    .ctrl-title {
      font-size: 0.82rem;
      font-weight: 800;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .ctrl-share {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;

    async function api(path) {
      const sep = path.includes('?') ? '&' : '?';
      try {
        const r = await fetch(`https://api.tmdb.org/3/${path}${sep}api_key=${TMDB_KEY}&language=en-US`);
        return r.ok ? r.json() : null;
      } catch {
        return null;
      }
    }

    function showToast(msg, dur = 2200) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), dur);
    }

    function lsGet(k, def = null) {
      try {
        const v = localStorage.getItem('afx_' + k);
        return v === null ? def : JSON.parse(v);
      } catch {
        return def;
      }
    }

    function lsSet(k, v) {
      try {
        localStorage.setItem('afx_' + k, JSON.stringify(v));
      } catch { }
    }

    const GENRES = { 28: 'Action', 12: 'Adventure', 16: 'Animation', 35: 'Comedy', 80: 'Crime', 99: 'Documentary', 18: 'Drama', 10751: 'Family', 14: 'Fantasy', 36: 'History', 27: 'Horror', 10749: 'Romance', 878: 'Sci-Fi', 53: 'Thriller' };
    const gl = id => GENRES[id] || '';

    /* ══════════ NAV ══════════ */
    window.addEventListener('scroll', () => $('nav').classList.toggle('solid', scrollY > 10));

    function setNav(id) {
      $$('.bn').forEach(b => b.classList.remove('on'));
      if ($(id)) $(id).classList.add('on');
    }

    function showPg(id) {
      $$('.pg, .player-pg').forEach(p => p.classList.remove('on'));
      $(id).classList.add('on');
      window.scrollTo(0, 0);
    }

    function goHome() {
      showPg('pg-home');
      $('nav').style.display = '';
    }

    function navSearch() {
      showPg('pg-search');
      $('nav').style.display = 'none';
      $('srchInp').value = '';
      $('ftabs').style.display = 'none';
      $('srchTtl').textContent = 'Trending Now';
      loadDiscover();
      setTimeout(() => $('srchInp').focus(), 120);
    }

    /* ══════════ HOME ══════════ */
    async function initHome() {
      const tr = await api('trending/all/week');
      if (tr?.results) {
        heroItems = tr.results.filter(i => i.backdrop_path && (i.media_type === 'movie' || i.media_type === 'tv')).slice(0, 7);
        buildHero();
      }
      buildRows();
    }

    function buildHero() {
      const sc = $('hslides'), dc = $('hdots');
      sc.innerHTML = dc.innerHTML = '';
      heroItems.forEach((item, i) => {
        sc.innerHTML += `<div class="hslide${i === 0 ? ' on' : ''}" id="hs${i}"><img src="${IMG_URL}original${item.backdrop_path}" loading="${i === 0 ? 'eager' : 'lazy'}" alt=""></div>`;
        dc.innerHTML += `<div class="hdot${i === 0 ? ' on' : ''}" onclick="jumpHero(${i})"></div>`;
      });
      setHero(0);
      clearInterval(heroTmr);
      heroTmr = setInterval(() => setHero((heroIdx + 1) % heroItems.length), 8000);
    }

    function jumpHero(i) {
      clearInterval(heroTmr);
      setHero(i);
      heroTmr = setInterval(() => setHero((heroIdx + 1) % heroItems.length), 8000);
    }

    function setHero(i) {
      heroIdx = i;
      $$('.hslide').forEach((el, idx) => el.classList.toggle('on', idx === i));
      $$('.hdot').forEach((el, idx) => el.classList.toggle('on', idx === i));
      const item = heroItems[i];
      if (!item) return;
      const mt = item.media_type === 'movie' ? 'movie' : 'tv';
      const yr = (item.release_date || item.first_air_date || '').slice(0, 4);
      const rat = (item.vote_average || 0).toFixed(1);
      const genres = (item.genre_ids || []).slice(0, 2).map(gl).filter(Boolean).join(' · ');
      $('hEye').textContent = (mt === 'movie' ? '🎬 Film' : '📺 Series') + (yr ? ' · ' + yr : '');
      $('hTitle').textContent = item.title || item.name || '';
      $('hMeta').innerHTML = `<span class="h-rat">★ ${rat}</span><span class="h-yr">${yr}</span>${genres ? `<span class="h-tag">${genres}</span>` : ''}`;
      $('hDesc').textContent = item.overview || '';
      $('hPlay').onclick = () => openDetail(item.id, mt);
      $('hInfo').onclick = () => openDetail(item.id, mt);
    }

    /* ══════════ HOME ROWS ══════════ */
    async function buildRows() {
      const rows = $('homeRows');
      rows.innerHTML = '';
      await addWide(rows, '🔥 Trending', 'trending/movie/week', 'movie');
      await addPoster(rows, '🎬 Now Playing', 'movie/now_playing', 'movie');
      await addWide(rows, '📺 TV Series', 'trending/tv/week', 'tv');
      await addPoster(rows, '⭐ Top Rated TV', 'tv/top_rated', 'tv');
      divider(rows, '🏮 ANIME');
      await addWide(rows, '🏮 Popular Anime', 'discover/tv?with_genres=16&with_original_language=ja&sort_by=popularity.desc', 'anime');
      await addPoster(rows, '🆕 New Anime', 'discover/tv?with_genres=16&with_original_language=ja&sort_by=first_air_date.desc', 'anime');
    }

    function divider(p, lbl) {
      const el = document.createElement('div');
      el.className = 'sdiv';
      el.innerHTML = `<div class="sdiv-line"></div><div class="sdiv-lbl">${lbl}</div><div class="sdiv-line"></div>`;
      p.appendChild(el);
    }

    async function addWide(p, title, endpoint, ft) {
      const uid = 'wr' + Math.random().toString(36).slice(2, 7);
      const w = document.createElement('div');
      w.className = 'row';
      const skHTML = Array(5).fill(`<div class="sk sk-w"></div>`).join('');
      w.innerHTML = `<div class="row-hdr"><div class="row-ttl">${title}</div></div><div class="slider" id="${uid}">${skHTML}</div>`;
      p.appendChild(w);
      const data = await api(endpoint);
      if (!data?.results) return;
      let h = '';
      data.results.filter(i => i.backdrop_path).slice(0, 12).forEach(item => {
        const mt = ft || item.media_type;
        if (!mt || mt === 'person') return;
        const yr = (item.release_date || item.first_air_date || '').slice(0, 4);
        const rat = (item.vote_average || 0).toFixed(1);
        h += `<div class="wcard" onclick="openDetail(${item.id}, '${mt}')"><img src="${IMG_URL}w780${item.backdrop_path}" class="wcard-img" loading="lazy" alt=""><div class="wcard-over"><div class="wcard-title">${item.title || item.name || ''}</div><div class="wcard-sub">★ ${rat} · ${yr}</div></div></div>`;
      });
      $(uid).innerHTML = h;
    }

    async function addPoster(p, title, endpoint, ft) {
      const uid = 'pr' + Math.random().toString(36).slice(2, 7);
      const w = document.createElement('div');
      w.className = 'row';
      const skHTML = Array(8).fill(`<div class="sk sk-p"></div>`).join('');
      w.innerHTML = `<div class="row-hdr"><div class="row-ttl">${title}</div></div><div class="slider" id="${uid}">${skHTML}</div>`;
      p.appendChild(w);
      const data = await api(endpoint);
      if (!data?.results) return;
      let h = '';
      data.results.forEach(item => {
        if (!item.poster_path) return;
        let mt = ft || item.media_type;
        if (!mt || mt === 'person') return;
        const yr = (item.release_date || item.first_air_date || '').slice(0, 4);
        const rat = (item.vote_average || 0).toFixed(1);
        h += `<div class="pcard" onclick="openDetail(${item.id}, '${mt}')"><img src="${IMG_URL}w342${item.poster_path}" class="pcard-img" loading="lazy" alt=""><div class="pcard-name">${item.title || item.name || ''}</div><div class="pcard-meta">${yr} · ★${rat}</div></div>`;
      });
      $(uid).innerHTML = h;
    }

    /* ══════════ GENRE FILTER ══════════ */
    async function filterGenre(cat, el) {
      $$('.gpill').forEach(p => p.classList.remove('on'));
      el.classList.add('on');
      if (cat === 'all') {
        buildRows();
        return;
      }
      const rows = $('homeRows');
      rows.innerHTML = '';
      const cfgs = {
        movie: [['trending/movie/week', '🔥 Trending', 'movie'], ['movie/popular', '🎬 Popular', 'movie']],
        tv: [['trending/tv/week', '📺 Trending', 'tv'], ['tv/popular', '⚡ Popular', 'tv']],
        anime: [['discover/tv?with_genres=16&with_original_language=ja&sort_by=popularity.desc', '🏮 Popular', 'anime']],
        action: [['discover/movie?with_genres=28', '💥 Action', 'movie']],
        comedy: [['discover/movie?with_genres=35', '😄 Comedy', 'movie']],
        horror: [['discover/movie?with_genres=27', '👻 Horror', 'movie']],
      };
      const list = cfgs[cat];
      if (!list) return;
      for (const [ep, ttl, type] of list) {
        await addWide(rows, ttl, ep, type);
      }
    }

    /* ══════════ SEARCH ══════════ */
    function onSearch(val) {
      clearTimeout(srchTmr);
      if (!val.trim()) {
        $('ftabs').style.display = 'none';
        $('srchTtl').textContent = 'Trending Now';
        loadDiscover();
        return;
      }
      srchTmr = setTimeout(() => doSearch(val.trim()), 320);
    }

    async function doSearch(q) {
      lastQ = q;
      $('srchTtl').textContent = `"${q}"`;
      $('ftabs').style.display = 'flex';
      const grid = $('srchGrid');
      grid.innerHTML = Array(12).fill(`<div class="sk sk-p" style="width:100%;aspect-ratio:2/3"></div>`).join('');
      const data = await api(`search/multi?query=${encodeURIComponent(q)}`);
      renderGrid(grid, data, srchFilter === 'all' ? null : srchFilter);
    }

    function setSF(f, el) {
      srchFilter = f;
      $$('.ftab').forEach(t => t.classList.remove('on'));
      el.classList.add('on');
      if (lastQ) doSearch(lastQ);
    }

    async function loadDiscover() {
      const grid = $('srchGrid');
      grid.innerHTML = Array(16).fill(`<div class="sk sk-p" style="width:100%;aspect-ratio:2/3"></div>`).join('');
      const data = await api('trending/all/week');
      renderGrid(grid, data, null);
    }

    function renderGrid(container, data, ft) {
      container.innerHTML = '';
      if (!data?.results?.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-ic">🔍</div><div class="empty-txt">No results found</div></div>`;
        return;
      }
      data.results.forEach(item => {
        if (!item.poster_path) return;
        let mt = ft || item.media_type;
        if (!mt || mt === 'person') return;
        const yr = (item.release_date || item.first_air_date || '').slice(0, 4);
        const rat = (item.vote_average || 0).toFixed(1);
        container.innerHTML += `<div class="pcard" style="width:100%" onclick="openDetail(${item.id}, '${mt}')"><img src="${IMG_URL}w342${item.poster_path}" class="pcard-img" loading="lazy" alt=""><div class="pcard-name">${item.title || item.name || ''}</div><div class="pcard-meta">${yr} · ★${rat}</div></div>`;
      });
    }

    /* ══════════ DETAIL SHEET ══════════ */
    async function openDetail(id, type) {
      const ov = $('detOverlay');
      $('detImg').src = '';
      $('detTitle').textContent = 'Loading…';
      $('detPill').textContent = '';
      $('detMeta').innerHTML = '';
      $('detOv').textContent = '';
      $('detCast').textContent = '';
      ov.classList.add('on');
      document.body.style.overflow = 'hidden';

      const tmdbType = type === 'anime' ? 'tv' : type;
      const meta = await api(`${tmdbType}/${id}?append_to_response=credits`);
      if (!meta) {
        closeDetail();
        return;
      }

      const title = meta.title || meta.name || '';
      const yr = (meta.release_date || meta.first_air_date || '').slice(0, 4);
      const rat = (meta.vote_average || 0).toFixed(1);
      const genres = (meta.genres || []).slice(0, 3).map(g => g.name).join(' · ');
      const runtime = meta.runtime ? `${meta.runtime}m` : (meta.episode_run_time?.[0] ? `~${meta.episode_run_time[0]}m/ep` : '');
      const cast = (meta.credits?.cast || []).slice(0, 5).map(c => c.name).join(', ');
      const imgSrc = meta.backdrop_path ? `${IMG_URL}w780${meta.backdrop_path}` : (meta.poster_path ? `${IMG_URL}w500${meta.poster_path}` : '');

      $('detImg').src = imgSrc;
      $('detPill').textContent = type === 'movie' ? '🎬 Film' : type === 'anime' ? '🏮 Anime' : '📺 Series';
      $('detTitle').textContent = title;
      $('detMeta').innerHTML = `<span class="sm-rat">★ ${rat}</span><span class="sm-yr">${yr}</span>${runtime ? `<span class="sm-tag">${runtime}</span>` : ''}${genres ? `<span class="sm-tag">${genres}</span>` : ''}`;
      $('detOv').textContent = meta.overview || '';
      if (cast) $('detCast').innerHTML = `<b>Cast:</b> ${cast}`;

      $('watchBtn').onclick = () => {
        closeDetail();
        openPlayer(id, type, 1, 1);
      };

      curDetail = { id, type, title, poster: meta.poster_path };
    }

    function closeDetail() {
      $('detOverlay').classList.remove('on');
      document.body.style.overflow = '';
    }

    function toggleWatchlist() {
      if (!curDetail) return;
      let list = lsGet('watchlist', []);
      const exists = list.some(i => i.id === curDetail.id && i.type === curDetail.type);
      if (exists) {
        list = list.filter(i => !(i.id === curDetail.id && i.type === curDetail.type));
        showToast('Removed from My List');
      } else {
        list.unshift({ ...curDetail, ts: Date.now() });
        showToast('Added to My List');
      }
      lsSet('watchlist', list);
      $('wlBtn').classList.toggle('on', !exists);
    }

    function playTrailer() {
      if (!curDetail) return;
      const tmdbType = curDetail.type === 'anime' ? 'tv' : curDetail.type;
      api(`${tmdbType}/${curDetail.id}/videos`).then(data => {
        const trailer = data?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
        if (trailer) {
          $('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
          $('trailerModal').classList.add('on');
          document.body.style.overflow = 'hidden';
        } else {
          showToast('❌ No trailer available');
        }
      });
    }

    function closeTrailerModal() {
      $('trailerModal').classList.remove('on');
      $('trailerFrame').src = '';
      document.body.style.overflow = '';
    }

    /* ══════════ PLAYER ══════════ */
    function srcUrl(id, type, season, ep, src) {
      src = src || pl.source;

      // Anime servers
      if (type === 'anime') {
        const aid = pl.anilistId || '';
        const mid = pl.malId || '';
        const urls = [];
        if (aid) {
          urls.push(`https://vidnest.fun/animepahe/${aid}/${ep}/sub`);
          urls.push(`https://vidnest.fun/animepahe/${aid}/${ep}/dub`);
        }
        if (mid) {
          urls.push(`https://megaplay.buzz/stream/mal/${mid}/${ep}/sub`);
          urls.push(`https://megaplay.buzz/stream/mal/${mid}/${ep}/dub`);
        }
        if (urls.length) return urls[src] || urls[0];
      }

      // Movies & TV
      const isTV = (type !== 'movie');
      const urls = isTV ? [
        `https://zxcstream.xyz/player/tv/${id}?season=${season}&episode=${ep}`,
        `https://vidout.pages.dev/tv/${id}/${season}/${ep}`,
        `https://vidnest.fun/tv/${id}/${season}/${ep}`,
        `https://player.videasy.net/tv/${id}/${season}/${ep}`,
        `https://vidlink.pro/tv/${id}/${season}/${ep}?autoplay=true`,
        `https://vidsrc.sbs/embed/tv/${id}/${season}/${ep}`,
      ] : [
        `https://zxcstream.xyz/player/movie/${id}`,
        `https://vidout.pages.dev/movie/${id}`,
        `https://vidnest.fun/movie/${id}`,
        `https://player.videasy.net/movie/${id}`,
        `https://vidlink.pro/movie/${id}?autoplay=true`,
        `https://vidsrc.sbs/embed/movie/${id}`,
      ];
      return urls[src] || urls[0];
    }

    async function openPlayer(id, type, season, ep) {
      season = season || 1;
      ep = ep || 1;
      pl = { id, type, season, ep, episodes: [], source: 0, nextEp: null, malId: null, anilistId: null };

      showPg('pg-player');
      $('nav').style.display = 'none';

      const tmdbType = type === 'anime' ? 'tv' : type;
      const meta = await api(`${tmdbType}/${id}?append_to_response=credits`);
      if (!meta) return;

      pl.meta = meta;

      const title = meta.title || meta.name || '';
      const yr = (meta.release_date || meta.first_air_date || '').slice(0, 4);
      const rat = (meta.vote_average || 0).toFixed(1);
      const genres = (meta.genres || []).slice(0, 3).map(g => g.name).join(' · ');
      const runtime = meta.runtime ? `${meta.runtime}m` : (meta.episode_run_time?.[0] ? `~${meta.episode_run_time[0]}m/ep` : '');
      const cast = (meta.credits?.cast || []).slice(0, 5).map(c => c.name).join(', ');

      $('ctrlTitle').textContent = title;
      $('plTitle').textContent = title;
      document.title = title + ' — AethoFlix';

      let metaHtml = `<span class="pl-rat">★ ${rat}</span><span>${yr}</span>`;
      if (runtime) metaHtml += `<span class="pl-tag">${runtime}</span>`;
      if (type !== 'movie' && meta.number_of_seasons) metaHtml += `<span class="pl-tag">${meta.number_of_seasons} Season${meta.number_of_seasons > 1 ? 's' : ''}</span>`;
      if (genres) metaHtml += `<span class="pl-tag">${genres}</span>`;
      $('plMeta').innerHTML = metaHtml;
      $('plOv').textContent = meta.overview || '';
      if (cast) $('plCast').innerHTML = `<b style="color:var(--text)">Cast:</b> ${cast}`;

      // Anime: Get MAL/AniList IDs
      if (type === 'anime') {
        const extIds = await api(`tv/${id}/external_ids`);
        pl.malId = extIds?.mal_id || null;
        pl.anilistId = extIds?.anilist_id || null;
      }

      // Set video source
      $('vidFrame').src = srcUrl(id, type, season, ep, 0);

      // TV/Anime: Load episodes
      if (type !== 'movie') {
        $('epSec').style.display = 'block';
        pl.seasons = (meta.seasons || []).filter(s => s.season_number > 0);
        buildSeasonRow();
        await loadEpisodes(season, ep);
      }

      // Load recommendations
      loadReco(id, tmdbType);
    }

    function setSource(idx, el) {
      pl.source = idx;
      $$('.src-btn').forEach(b => b.classList.remove('on'));
      el.classList.add('on');
      $('vidFrame').src = srcUrl(pl.id, pl.type, pl.season, pl.ep, idx);
    }

    function closePlayer() {
      $('vidFrame').src = '';
      document.title = 'AethoFlix';
      goHome();
      $('nav').style.display = '';
    }

    function shareUrl() {
      const url = location.href;
      if (navigator.share) {
        navigator.share({ title: document.title, url });
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
      }
    }

    function toggleOv() {
      ovOpen = !ovOpen;
      $('plOv').classList.toggle('show', ovOpen);
      $('plOvBtn').textContent = ovOpen ? '▲ Hide Overview' : '▼ Overview';
    }

    function buildSeasonRow() {
      const s = pl.seasons;
      if (!s.length) {
        const n = pl.meta?.number_of_seasons || 1;
        $('seasonRow').innerHTML = Array.from({ length: n }, (_, i) => `<button class="s-pill${pl.season === i + 1 ? ' on' : ''}" onclick="switchSeason(${i + 1}, this)">Season ${i + 1}</button>`).join('');
        return;
      }
      $('seasonRow').innerHTML = s.map(sv => `<button class="s-pill${pl.season === sv.season_number ? ' on' : ''}" onclick="switchSeason(${sv.season_number}, this)">Season ${sv.season_number}</button>`).join('');
    }

    async function switchSeason(n, el) {
      $$('.s-pill').forEach(p => p.classList.remove('on'));
      el.classList.add('on');
      pl.season = n;
      pl.ep = 1;
      $('epList').innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);">Loading episodes…</div>`;
      $('vidFrame').src = srcUrl(pl.id, pl.type, n, 1, pl.source);
      await loadEpisodes(n, 1);
    }

    async function loadEpisodes(season, currentEp) {
      const data = await api(`tv/${pl.id}/season/${season}`);
      if (!data?.episodes) {
        $('epList').innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);">No episodes found.</div>`;
        return;
      }
      pl.episodes = data.episodes;
      renderEpisodes(data.episodes, currentEp);
      updateNextBanner();
    }

    function renderEpisodes(eps, currentEp) {
      $('epList').innerHTML = eps.map(ep => {
        const playing = ep.episode_number === currentEp;
        const thumb = ep.still_path ? `${IMG_URL}w300${ep.still_path}` : '';
        const rt = ep.runtime ? ep.runtime + 'm' : '';
        return `<div class="ep-item${playing ? ' active' : ''}" onclick="playEpisode(${ep.season_number}, ${ep.episode_number})">
          <div class="ep-thumb-box">
            <img class="ep-thumb" src="${thumb}" loading="lazy" alt="">
            <div class="ep-now">▶</div>
          </div>
          <div class="ep-info">
            <div class="ep-num">E${ep.episode_number}${rt ? ' · ' + rt : ''}</div>
            <div class="ep-name">${ep.name || 'Episode ' + ep.episode_number}</div>
            ${ep.overview ? `<div class="ep-ov">${ep.overview}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    function playEpisode(season, ep) {
      pl.season = season;
      pl.ep = ep;
      $('vidFrame').src = srcUrl(pl.id, pl.type, season, ep, pl.source);
      renderEpisodes(pl.episodes, ep);
      updateNextBanner();
    }

    function updateNextBanner() {
      const idx = pl.episodes.findIndex(e => e.episode_number === pl.ep && e.season_number === pl.season) + 1;
      const next = pl.episodes[idx];
      if (!next) {
        $('nextBanner').classList.remove('show');
        pl.nextEp = null;
        return;
      }
      pl.nextEp = next;
      $('nbTitle').textContent = next.name || 'Episode ' + next.episode_number;
      $('nbSub').textContent = `S${pl.season} E${next.episode_number}${next.runtime ? ' · ' + next.runtime + 'm' : ''}`;
      $('nbImg').src = next.still_path ? `${IMG_URL}w300${next.still_path}` : '';
      $('nextBanner').classList.add('show');
    }

    function playNextEp() {
      if (pl.nextEp) {
        playEpisode(pl.nextEp.season_number, pl.nextEp.episode_number);
      }
    }

    async function loadReco(id, tmdbType) {
      const data = await api(`${tmdbType}/${id}/recommendations`);
      const grid = $('recoGrid');
      if (!data?.results?.length) {
        grid.innerHTML = '';
        return;
      }
      grid.innerHTML = data.results.filter(r => r.backdrop_path).slice(0, 6).map(r => {
        const mt = r.media_type || tmdbType;
        const yr = (r.release_date || r.first_air_date || '').slice(0, 4);
        const rat = (r.vote_average || 0).toFixed(1);
        return `<div class="reco-card" onclick="openPlayer(${r.id}, '${mt}', 1, 1)">
          <img class="reco-img" src="${IMG_URL}w500${r.backdrop_path}" loading="lazy" alt="">
          <div class="reco-body">
            <div class="reco-name">${r.title || r.name || ''}</div>
            <div class="reco-meta">★ ${rat} · ${yr}</div>
          </div>
        </div>`;
      }).join('');
    }

    /* ══════════ VIP SYSTEM ══════════ */
    function checkVipStatus() {
      const status = lsGet('vipStatus', null);
      const badge = $('vipBadge');
      if (status && status.active && (!status.expires || Date.now() < status.expires)) {
        badge.textContent = '👑 VIP';
        badge.classList.add('vip-on');
        return true;
      }
      badge.textContent = '👑 Redeem';
      badge.classList.remove('vip-on');
      return false;
    }

    function openVipGate() {
      $('vipGate').classList.add('on');
      $('vipInp').value = '';
      $('vipErr').textContent = '';
      document.body.style.overflow = 'hidden';
      setTimeout(() => $('vipInp').focus(), 300);
    }

    function closeVipGate() {
      $('vipGate').classList.remove('on');
      document.body.style.overflow = '';
    }

    function redeemVip() {
      const code = $('vipInp').value.trim().toUpperCase();
      if (!code) {
        $('vipErr').textContent = 'Please enter a code.';
        return;
      }
      const codes = lsGet('vipCodes', []);
      const idx = codes.findIndex(c => c.code === code);
      if (idx === -1) {
        $('vipErr').textContent = '❌ Invalid code.';
        return;
      }
      const c = codes[idx];
      if (c.status === 'revoked') {
        $('vipErr').textContent = '❌ This code has been revoked.';
        return;
      }
      if (c.status === 'used' && c.type === '1use') {
        $('vipErr').textContent = '❌ This code has already been used.';
        return;
      }
      if (c.expires && Date.now() > c.expires) {
        $('vipErr').textContent = '❌ This code has expired.';
        return;
      }
      if (c.type === '1use') codes[idx].status = 'used';
      lsSet('vipCodes', codes);
      lsSet('vipStatus', { active: true, code, expires: c.expires, since: Date.now() });
      closeVipGate();
      checkVipStatus();
      showToast('👑 VIP Unlocked!');
    }

    /* ══════════ ANNOUNCEMENT ══════════ */
    function checkAnnouncement() {
      const msg = lsGet('broadcast', '');
      if (!msg) {
        $('annBanner').classList.remove('show');
        return;
      }
      const dismissed = lsGet('annDismissed', '');
      if (dismissed === msg) {
        $('annBanner').classList.remove('show');
        return;
      }
      $('annTxt').textContent = msg;
      $('annBanner').classList.add('show');
    }

    function dismissAnn() {
      const msg = lsGet('broadcast', '');
      lsSet('annDismissed', msg);
      $('annBanner').classList.remove('show');
    }

    /* ══════════ LOGO TAP (for future admin panel) ══════════ */
    let logoTaps = 0, logoTmr = null;
    function logoTap() {
      goHome();
      logoTaps++;
      clearTimeout(logoTmr);
      if (logoTaps >= 5) {
        logoTaps = 0;
        showToast('👑 Admin panel coming soon');
        return;
      }
      logoTmr = setTimeout(() => logoTaps = 0, 2000);
    }

    /* ══════════ BOOT ══════════ */
    (async function boot() {
      checkVipStatus();
      checkAnnouncement();
      initHome();
    })();
  </script>
</body>

</html>
