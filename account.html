<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AethoFlix - Account</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #080810;
      --surface: #0f0f1a;
      --card: #14141f;
      --border: #1e1e2e;
      --accent: #e50914;
      --accent2: #ff2233;
      --text: #f0f0f5;
      --sub: #8888aa;
      --muted: #3a3a55;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 40px;
      text-align: center;
      letter-spacing: -1px;
    }

    .logo span {
      color: var(--accent);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      padding: 11px 14px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: 0.2s;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      background: rgba(229, 9, 20, 0.04);
    }

    input::placeholder {
      color: var(--muted);
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      transition: 0.15s;
      font-family: inherit;
    }

    button:active {
      transform: scale(0.97);
      background: var(--accent2);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1.5px solid var(--border);
    }

    .secondary-btn:active {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }

    .text-center {
      text-align: center;
      font-size: 0.85rem;
      color: var(--sub);
    }

    .text-center a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-weight: 700;
    }

    .text-center a:hover {
      opacity: 0.8;
    }

    .error {
      background: rgba(229, 9, 20, 0.12);
      border: 1px solid rgba(229, 9, 20, 0.25);
      color: #ff6b6b;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-bottom: 12px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .success {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.25);
      color: #22c55e;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-bottom: 12px;
      display: none;
    }

    .success.show {
      display: block;
    }

    .otp-input {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .otp-digit {
      width: 50px;
      height: 50px;
      font-size: 1.5rem;
      text-align: center;
      font-weight: 700;
    }

    .loading {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }

    .hidden {
      display: none !important;
    }

    .tab-switch {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--sub);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.8rem;
      transition: 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    @media (max-width: 480px) {
      .container {
        padding: 16px;
      }

      .card {
        padding: 20px;
      }

      .logo {
        font-size: 1.4rem;
        margin-bottom: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>Aetho</span>flix Account</div>

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="page active">
      <div class="card">
        <div class="tab-switch">
          <button class="tab-btn active" onclick="switchTab('otp')">OTP Login</button>
          <button class="tab-btn" onclick="switchTab('password')">Password</button>
        </div>

        <!-- OTP Login -->
        <div id="otpLoginTab">
          <div class="error" id="loginError"></div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com">
          </div>
          <button id="sendOtpBtn" onclick="sendLoginOTP()">📧 Send OTP</button>

          <!-- OTP Verification (hidden initially) -->
          <div id="otpVerifySection" class="hidden" style="margin-top: 16px;">
            <div style="font-size: 0.8rem;color:var(--sub);margin-bottom:10px;text-align:center">
              Enter the 6-digit code sent to your email
            </div>
            <div class="otp-input" id="otpInputs"></div>
            <button id="verifyOtpBtn" onclick="verifyLoginOTP()">✓ Verify & Login</button>
          </div>
        </div>

        <!-- Password Login -->
        <div id="passwordLoginTab" class="hidden">
          <div class="error" id="passwordError"></div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="passwordEmail" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="passwordInput" placeholder="••••••••">
          </div>
          <button onclick="loginWithPassword()">🔓 Login</button>
        </div>

        <div style="margin-top:20px;text-align:center;font-size:0.85rem;color:var(--sub)">
          Don't have an account? <a onclick="switchPage('signup')">Sign Up</a>
        </div>
      </div>
    </div>

    <!-- SIGNUP PAGE -->
    <div id="signupPage" class="page">
      <div class="card">
        <div class="error" id="signupError"></div>

        <!-- Step 1: Email & OTP -->
        <div id="signupStep1">
          <h3 style="font-size:1rem;margin-bottom:16px">Create Account</h3>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="your@email.com">
          </div>
          <button id="signupSendOtpBtn" onclick="sendSignupOTP()">📧 Send OTP</button>
        </div>

        <!-- Step 2: OTP Verification -->
        <div id="signupStep2" class="hidden">
          <div style="font-size:0.8rem;color:var(--sub);margin-bottom:10px;text-align:center">
            Enter the 6-digit code sent to your email
          </div>
          <div class="otp-input" id="signupOtpInputs"></div>
          <button id="signupVerifyOtpBtn" onclick="verifySignupOTP()" style="margin-bottom:12px">
            ✓ Verify Code
          </button>
          <button class="secondary-btn" onclick="backToSignupEmail()">← Back</button>
        </div>

        <!-- Step 3: Complete Profile -->
        <div id="signupStep3" class="hidden">
          <h3 style="font-size:1rem;margin-bottom:16px">Complete Your Profile</h3>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="signupPasswordConfirm" placeholder="••••••••">
          </div>
          <button id="createAccountBtn" onclick="createAccount()">✨ Create Account</button>
        </div>

        <div style="margin-top:20px;text-align:center;font-size:0.85rem;color:var(--sub)">
          Already have an account? <a onclick="switchPage('login')">Login</a>
        </div>
      </div>
    </div>

    <!-- PROFILE PAGE -->
    <div id="profilePage" class="page">
      <div class="card">
        <h3 style="font-size:1rem;margin-bottom:16px">👤 My Profile</h3>
        <div class="success" id="profileSuccess"></div>
        <div class="error" id="profileError"></div>

        <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;text-align:center">
          <div style="font-size:2rem;margin-bottom:8px">👤</div>
          <div id="profileName" style="font-size:1rem;font-weight:700;margin-bottom:4px">Loading...</div>
          <div id="profileEmail" style="font-size:0.85rem;color:var(--sub)"></div>
          <div id="profilePlan" style="font-size:0.75rem;color:var(--accent);font-weight:700;margin-top:8px">FREE PLAN</div>
        </div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="editName" placeholder="Your name">
        </div>

        <div class="form-group">
          <label>Quality Preference</label>
          <select id="editQuality">
            <option value="480p">480p (SD)</option>
            <option value="720p" selected>720p (HD)</option>
            <option value="1080p">1080p (Full HD)</option>
          </select>
        </div>

        <button onclick="updateProfile()" style="margin-bottom:10px">💾 Save Changes</button>
        <button class="secondary-btn" onclick="logout()" style="margin-bottom:20px">🚪 Logout</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';
    let currentUser = null;
    let loginOtpData = null;
    let signupOtpData = null;

    // ════════ PAGE NAVIGATION ════════
    function switchPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(page + 'Page').classList.add('active');
    }

    function switchTab(tab) {
      if (tab === 'otp') {
        document.getElementById('otpLoginTab').classList.remove('hidden');
        document.getElementById('passwordLoginTab').classList.add('hidden');
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.querySelectorAll('.tab-btn')[1].classList.remove('active');
      } else {
        document.getElementById('otpLoginTab').classList.add('hidden');
        document.getElementById('passwordLoginTab').classList.remove('hidden');
        document.querySelectorAll('.tab-btn')[0].classList.remove('active');
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
      }
    }

    // ════════ OTP INPUT HANDLING ════════
    function createOTPInputs(containerId, callback) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.maxLength = '1';
        input.class = 'otp-digit';
        input.className = 'otp-digit';
        input.inputMode = 'numeric';
        input.addEventListener('input', (e) => {
          if (e.target.value && i < 5) {
            container.children[i + 1].focus();
          }
          if (callback) callback();
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && i > 0) {
            container.children[i - 1].focus();
          }
        });
        container.appendChild(input);
      }
    }

    function getOTPValue(containerId) {
      return Array.from(document.getElementById(containerId).children)
        .map(input => input.value)
        .join('');
    }

    // ════════ LOGIN - OTP ════════
    async function sendLoginOTP() {
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) {
        showError('loginError', 'Email required');
        return;
      }

      document.getElementById('sendOtpBtn').disabled = true;

      try {
        const res = await fetch(`${API_URL}/auth/login/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          showError('loginError', data.error || 'Error sending OTP');
          return;
        }

        loginOtpData = { email };
        document.getElementById('otpVerifySection').classList.remove('hidden');
        createOTPInputs('otpInputs');
        document.getElementById('otpInputs').children[0].focus();
        showSuccess('loginError', '✓ OTP sent to ' + email);
      } catch (error) {
        showError('loginError', error.message);
      } finally {
        document.getElementById('sendOtpBtn').disabled = false;
      }
    }

    async function verifyLoginOTP() {
      const otp = getOTPValue('otpInputs');
      if (otp.length !== 6) {
        showError('loginError', 'Enter complete OTP');
        return;
      }

      document.getElementById('verifyOtpBtn').disabled = true;

      try {
        const res = await fetch(`${API_URL}/auth/login/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: loginOtpData.email, otp })
        });

        const data = await res.json();

        if (!res.ok) {
          showError('loginError', data.error || 'Login failed');
          return;
        }

        // Save token and user data
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        currentUser = data.user;

        // Redirect to main app
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 500);
      } catch (error) {
        showError('loginError', error.message);
      } finally {
        document.getElementById('verifyOtpBtn').disabled = false;
      }
    }

    // ════════ LOGIN - PASSWORD ════════
    async function loginWithPassword() {
      const email = document.getElementById('passwordEmail').value.trim();
      const password = document.getElementById('passwordInput').value;

      if (!email || !password) {
        showError('passwordError', 'Email and password required');
        return;
      }

      const btn = event.target;
      btn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showError('passwordError', data.error || 'Login failed');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        currentUser = data.user;

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 500);
      } catch (error) {
        showError('passwordError', error.message);
      } finally {
        btn.disabled = false;
      }
    }

    // ════════ SIGNUP - OTP ════════
    async function sendSignupOTP() {
      const email = document.getElementById('signupEmail').value.trim();
      if (!email) {
        showError('signupError', 'Email required');
        return;
      }

      document.getElementById('signupSendOtpBtn').disabled = true;

      try {
        const res = await fetch(`${API_URL}/auth/signup/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          showError('signupError', data.error || 'Error sending OTP');
          return;
        }

        signupOtpData = { email };
        document.getElementById('signupStep1').classList.add('hidden');
        document.getElementById('signupStep2').classList.remove('hidden');
        createOTPInputs('signupOtpInputs');
        document.getElementById('signupOtpInputs').children[0].focus();
      } catch (error) {
        showError('signupError', error.message);
      } finally {
        document.getElementById('signupSendOtpBtn').disabled = false;
      }
    }

    async function verifySignupOTP() {
      const otp = getOTPValue('signupOtpInputs');
      if (otp.length !== 6) {
        showError('signupError', 'Enter complete OTP');
        return;
      }

      signupOtpData.otp = otp;
      document.getElementById('signupVerifyOtpBtn').disabled = true;

      // Move to step 3 (profile completion)
      document.getElementById('signupStep2').classList.add('hidden');
      document.getElementById('signupStep3').classList.remove('hidden');
      document.getElementById('signupName').focus();

      document.getElementById('signupVerifyOtpBtn').disabled = false;
    }

    function backToSignupEmail() {
      document.getElementById('signupStep1').classList.remove('hidden');
      document.getElementById('signupStep2').classList.add('hidden');
      document.getElementById('signupEmail').focus();
    }

    async function createAccount() {
      const name = document.getElementById('signupName').value.trim();
      const password = document.getElementById('signupPassword').value;
      const passwordConfirm = document.getElementById('signupPasswordConfirm').value;

      if (!name || !password) {
        showError('signupError', 'All fields required');
        return;
      }

      if (password !== passwordConfirm) {
        showError('signupError', 'Passwords do not match');
        return;
      }

      if (password.length < 6) {
        showError('signupError', 'Password must be at least 6 characters');
        return;
      }

      document.getElementById('createAccountBtn').disabled = true;

      try {
        const res = await fetch(`${API_URL}/auth/signup/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: signupOtpData.email,
            otp: signupOtpData.otp,
            password,
            name
          })
        });

        const data = await res.json();

        if (!res.ok) {
          showError('signupError', data.error || 'Signup failed');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        currentUser = data.user;

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 500);
      } catch (error) {
        showError('signupError', error.message);
      } finally {
        document.getElementById('createAccountBtn').disabled = false;
      }
    }

    // ════════ PROFILE ════════
    async function loadProfile() {
      const token = localStorage.getItem('token');
      if (!token) {
        switchPage('login');
        return;
      }

      try {
        const res = await fetch(`${API_URL}/auth/profile`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) {
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          switchPage('login');
          return;
        }

        const user = await res.json();
        currentUser = user;

        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileEmail').textContent = user.email;
        document.getElementById('profilePlan').textContent = user.plan.toUpperCase() + ' PLAN';
        document.getElementById('editName').value = user.name;
        document.getElementById('editQuality').value = user.preferences?.quality || '720p';

        switchPage('profile');
      } catch (error) {
        console.error('Error loading profile:', error);
        switchPage('login');
      }
    }

    async function updateProfile() {
      const token = localStorage.getItem('token');
      const name = document.getElementById('editName').value.trim();
      const quality = document.getElementById('editQuality').value;

      if (!name) {
        showError('profileError', 'Name required');
        return;
      }

      const btn = event.target;
      btn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/auth/profile`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            name,
            preferences: { ...currentUser.preferences, quality }
          })
        });

        const data = await res.json();

        if (!res.ok) {
          showError('profileError', data.error || 'Update failed');
          return;
        }

        showSuccess('profileSuccess', '✓ Profile updated');
        setTimeout(() => loadProfile(), 1000);
      } catch (error) {
        showError('profileError', error.message);
      } finally {
        btn.disabled = false;
      }
    }

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        currentUser = null;
        switchPage('login');
        document.getElementById('loginEmail').value = '';
        document.getElementById('passwordEmail').value = '';
        document.getElementById('passwordInput').value = '';
      }
    }

    // ════════ UTILS ════════
    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = '❌ ' + message;
      el.classList.remove('hidden');
      el.classList.add('show');
      setTimeout(() => {
        el.classList.remove('show');
      }, 3000);
    }

    function showSuccess(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.classList.remove('hidden');
      el.classList.add('show');
      setTimeout(() => {
        el.classList.remove('show');
      }, 3000);
    }

    // ════════ INIT ════════
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      if (token) {
        loadProfile();
      } else {
        switchPage('login');
      }
    });

    // Check if returning from main app
    if (localStorage.getItem('redirectToProfile')) {
      localStorage.removeItem('redirectToProfile');
      loadProfile();
    }
  </script>
</body>
</html>
